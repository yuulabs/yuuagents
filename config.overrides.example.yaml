# ============================================================================
# yuuagents — Configuration Overrides (EXAMPLE)
# ============================================================================
#
# Copy this file to `config.overrides.yaml` and edit it.
# `yagents install` deep-merges overrides on top of the bundled default
# template, so you only need to specify the fields you want to change.
# ============================================================================

snapshot:
  enabled: true
  restore_on_start: false

# Example: use Anthropic instead of (or in addition to) OpenAI
# providers:
#   anthropic-main:
#     api_type: anthropic-messages
#     api_key_env: ANTHROPIC_API_KEY
#     default_model: claude-3-5-sonnet-20241022

# Example: enable Docker-backed tools for the main agent
# agents:
#   main:
#     tools:
#       - execute_bash
#       - read_file
#       - edit_file
#       - delete_file

# Example: define a custom agent
# agents:
#   devops:
#     provider: openai-default
#     model: gpt-4o
#     persona: >
#       You are a DevOps engineer specializing in CI/CD and infrastructure.
#     tools:
#       - sleep
#       - view_image
