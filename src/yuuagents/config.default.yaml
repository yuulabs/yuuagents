# ============================================================================
# yuuagents — Bundled Default Configuration
# ============================================================================
#
# This template is shipped inside the package and used by `yagents install`
# when no project-local config is provided.
#
# It is intentionally minimal and does not require Docker or web extras.
# Copy it into ~/.yagents/config.yaml and edit it for your environment.
# ============================================================================

snapshot:
  enabled: false
  restore_on_start: false

db:
  url: sqlite+aiosqlite:///~/.yagents/tasks.sqlite3

yuutrace:
  db_path: ~/.yagents/traces.db
  ui_port: 8080
  server_port: 4318

daemon:
  socket: ~/.yagents/yagents.sock
  log_level: info

docker:
  image: yuuagents-runtime:latest

tavily:
  api_key_env: TAVILY_API_KEY

providers:
  openai-default:
    api_type: openai-chat-completion
    api_key_env: OPENAI_API_KEY
    default_model: gpt-4o
    base_url: ""
    organization: ""
    pricing: []

agents:
  main:
    description: Default general-purpose agent.
    provider: openai-default
    model: gpt-4o
    persona: >
      You are a careful, concise assistant.
    tools:
      - sleep
      - view_image
